# direxio-connect configuration
# Docs: https://github.com/YingSuiAI/direxio-connect
#
# This distribution is Direxio-only. The only supported platform type is
# "matrix", and the Matrix account should be the local @agent:<server> user
# returned by Direxio agent.matrix_session.create.

language = "zh"
data_dir = "~/.direxio-connect"

[log]
level = "info"

[display]
mode = "full"
reply_footer = true
show_context_indicator = true

[stream_preview]
enabled = true
interval_ms = 1500

[rate_limit]
max_messages = 20
window_secs = 60

[[projects]]
name = "direxio-agent-room"

[projects.agent]
type = "codex"
# For Hermes ACP, replace this agent block with:
# [projects.agent]
# type = "acp"
# [projects.agent.options]
# work_dir = "/path/to/project"
# cmd = "direxio-connect"
# args = ["hermes-acp-adapter", "--", "hermes", "acp"]
# display_name = "Hermes ACP"

[projects.agent.options]
work_dir = "/path/to/project"

[[projects.platforms]]
type = "matrix"

[projects.platforms.options]
homeserver = "https://im.example.com"
access_token = "agent-matrix-access-token"
user_id = "@agent:im.example.com"
device_id = "DIREXIO_CC_CONNECT"
room_id = "!real-agent-room:im.example.com"
share_session_in_channel = true
group_reply_all = true
auto_join = false
auto_verify = false

# Optional Direxio Message Server P2P websocket gateway.
# When configured, websocket drives agent online state and streaming previews.
p2p_base_url = "https://im.example.com/_p2p"
agent_token = "p2p_agent_token"
